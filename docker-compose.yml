version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: neighbourhood_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: neighbourhood_exchange
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neighbourhood_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongodb_data:
